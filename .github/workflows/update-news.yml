name: Update news site

on:
  schedule:
    # 07:00 JST every day. GitHub Actions cron uses UTC.
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-mini

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch and summarize news
        run: python agent.py

      - name: Generate static site
        run: python generate_site.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json docs/index.html docs/style.css
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update news site"
            git push
          fi
